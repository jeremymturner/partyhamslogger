name: Claude

# Lets Claude work the issue tracker:
#   * label an issue 'claude' (at creation or later) and it's investigated
#     (analysis comment, + a draft PR for small, clear fixes);
#   * any "@claude …" comment on an issue or PR (or in a PR review) is answered.
#
# Prerequisites (one-time, done by a repo admin via `claude /install-github-app`):
#   1. The Claude GitHub App installed on this repo (https://github.com/apps/claude).
#   2. Auth secret. This repo uses CLAUDE_CODE_OAUTH_TOKEN (a Claude subscription
#      token, set up by the install flow). To use a pay-as-you-go API key instead,
#      set ANTHROPIC_API_KEY and replace the `claude_code_oauth_token:` lines with
#      `anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}`.

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write  # the action exchanges a GitHub OIDC token for a Claude-App token

jobs:
  # Investigate an issue once it carries the 'claude' label — either applied at
  # creation, or added later (which is the usual "hand this to Claude" trigger).
  investigate:
    if: |
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'claude')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'claude')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: claude-issue-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      # Pre-install the project + test deps so Claude doesn't spend turns/minutes
      # bootstrapping the venv before it can run the suite.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3   # Qt runtime for offscreen UI tests
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Investigate this GitHub issue (it was labeled for you). Read the description,
            search the codebase for the relevant code, and identify the likely
            root cause. Post a clear analysis comment on the issue with your
            findings and a proposed approach. If the fix is small and
            unambiguous, open a draft PR from a new branch; otherwise just
            comment.

            Dependencies are already installed (no venv setup needed). Run tests
            with `python -m pytest -q`; UI tests need `QT_QPA_PLATFORM=offscreen`.
            Lint with `python -m ruff check src tests`.
          claude_args: --max-turns 50 --model claude-opus-4-8 --allowedTools Bash,Edit,Write,Read,Glob,Grep,WebFetch,TodoWrite

  # Respond to "@claude …" mentions in issue/PR comments and PR reviews.
  mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: claude-mention-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --max-turns 50 --model claude-opus-4-8 --allowedTools Bash,Edit,Write,Read,Glob,Grep,WebFetch,TodoWrite
