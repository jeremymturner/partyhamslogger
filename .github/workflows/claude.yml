name: Claude

# Lets Claude work the issue tracker automatically:
#   * every newly-filed issue is investigated (analysis comment, + a draft PR for
#     small, clear fixes);
#   * any "@claude …" comment on an issue or PR (or in a PR review) is answered.
#
# Prerequisites (one-time, done by a repo admin via `claude /install-github-app`):
#   1. The Claude GitHub App installed on this repo (https://github.com/apps/claude).
#   2. Auth secret. This repo uses CLAUDE_CODE_OAUTH_TOKEN (a Claude subscription
#      token, set up by the install flow). To use a pay-as-you-go API key instead,
#      set ANTHROPIC_API_KEY and replace the `claude_code_oauth_token:` lines with
#      `anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}`.

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write  # the action exchanges a GitHub OIDC token for a Claude-App token

jobs:
  # Auto-investigate every newly filed issue.
  investigate:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claude-issue-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Investigate this newly filed GitHub issue. Read the description,
            search the codebase for the relevant code, and identify the likely
            root cause. Post a clear analysis comment on the issue with your
            findings and a proposed approach. If the fix is small and
            unambiguous, open a draft PR from a new branch; otherwise just
            comment. Run the test suite for anything you change.
          claude_args: --max-turns 25 --model claude-opus-4-8 --allowedTools Bash,Edit,Write,Read,Glob,Grep,WebFetch,TodoWrite

  # Respond to "@claude …" mentions in issue/PR comments and PR reviews.
  mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: claude-mention-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --max-turns 30 --model claude-opus-4-8 --allowedTools Bash,Edit,Write,Read,Glob,Grep,WebFetch,TodoWrite
