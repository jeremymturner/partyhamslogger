name: Claude

# Lets Claude work the issue tracker automatically:
#   * every newly-filed issue is investigated (analysis comment, + a draft PR for
#     small, clear fixes);
#   * any "@claude …" comment on an issue or PR (or in a PR review) is answered.
#
# Prerequisites (one-time, done by a repo admin — see README/PR notes):
#   1. Install the Claude GitHub App:  claude /install-github-app
#      (or manually from https://github.com/apps/claude)
#   2. Add the repo secret ANTHROPIC_API_KEY  (or CLAUDE_CODE_OAUTH_TOKEN to bill
#      a Claude subscription — swap it in below). Until the secret exists, runs
#      will fail, so configure it before merging this workflow.

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Auto-investigate every newly filed issue.
  investigate:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claude-issue-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Investigate this newly filed GitHub issue. Read the description,
            search the codebase for the relevant code, and identify the likely
            root cause. Post a clear analysis comment on the issue with your
            findings and a proposed approach. If the fix is small and
            unambiguous, open a draft PR from a new branch; otherwise just
            comment. Run the test suite for anything you change.
          claude_args: --max-turns 8 --model claude-opus-4-8

  # Respond to "@claude …" mentions in issue/PR comments and PR reviews.
  mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: claude-mention-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --max-turns 12 --model claude-opus-4-8
